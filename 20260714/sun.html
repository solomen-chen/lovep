<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>童女生子</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: #ffd700;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background: linear-gradient(to bottom, #4b0082, #000000);
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        h1 {
            font-size: 3em;
            margin: 0;
            text-shadow: 0 0 10px #ffd700;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .image-card {
            background-color: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .image-card:hover {
            transform: scale(1.05);
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        .caption {
            padding: 15px;
            font-size: 1.2em;
            color: #ffd700;
        }
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌟 童女生子 🌟</h1>
        <p>  </p>
    </header>
    
    <div class="container">
        <div class="image-grid">
            <div class="image-card">
                <img src="images/以利沙白.jpeg" alt="以利沙白">
                <div class="caption">以利沙白</div>
            </div>
            
            <div class="image-card">
                <img src="images/太陽.jpeg" alt="Sun">
                <div class="caption">地球，月球，太陽</div>
            </div>
            
           
        </div>
        
        
    </div>
    
    <footer>
        &copy; 2026/07/14 - 愛牧小組分享
    </footer>
</body>
</html>
